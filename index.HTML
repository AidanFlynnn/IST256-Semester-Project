<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="CSS/styles.css">

<title>Group 7</title>
<link rel="icon" type="images/x-ico" href="images/Group7.ico">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>


.main-headline {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 10px;
}

.main-img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.main-desc {
    font-size: 14px;
}

/* ===== SIDE ARTICLES ===== */
.small-articles p {
    font-size: 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 6px;
}

/* ===== GRID ARTICLES ===== */
.article-card {
    width: 30%;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
}

.article-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.article-card h3 {
    font-size: 16px;
    font-weight: bold;
}

.article-card p {
    font-size: 12px;
}

</style>

</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <img src="images/Group7.ico" width="60" height="60">

        <ul class="navbar-nav ms-4 d-flex flex-row gap-4">
            <li><a href="index.html" class="nav-link text-white"><strong>Home</strong></a></li>
            <li><a href="#Local" class="nav-link text-white"><strong>Local News</strong></a></li>
            <li><a href="#Sports" class="nav-link text-white"><strong>Sports</strong></a></li>
            <li><a href="#Politics" class="nav-link text-white"><strong>Politics</strong></a></li>
        </ul>

        <select class="form-select w-auto ms-auto" onchange="window.location.href=this.value">
            <option selected disabled>Account</option>
            <option value="HTML/accountReg.html">Registration</option>
            <option value="HTML/login.html">Login</option>
        </select>
    </div>
</nav>


<div class="container mt-4">
    <div class="row">


        <div class="col-md-3">
            <div id="leftStories" class="small-articles"></div>
        </div>


        <div class="col-md-6">
            <h1 id="mainTitle" class="main-headline"></h1>
            <img id="mainImage" class="main-img">
            <p id="mainDesc" class="main-desc"></p>
        </div>


        <div class="col-md-3">
            <div id="rightStories" class="small-articles"></div>
        </div>

    </div>
</div>

<div class="container mt-4 d-flex flex-wrap" id="articleGrid"></div>

<script src="JS/news.js"></script>

</body>

<footer class="bg-primary text-white text-center py-3">
    <p><em>Delivering the truth effectively and efficiently</em></p>
</footer>

</html>
